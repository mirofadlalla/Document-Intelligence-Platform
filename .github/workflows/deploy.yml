name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-to-huggingface
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          set -e

          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Secret HF_TOKEN is not set. Add it under Settings > Secrets and variables > Actions." >&2
            exit 1
          fi
          if [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE_NAME" ]; then
            echo "::error::Secrets HF_USERNAME and/or HF_SPACE_NAME are not set. Add them under Settings > Secrets and variables > Actions." >&2
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git remote add space "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"

          git push --force space main:main