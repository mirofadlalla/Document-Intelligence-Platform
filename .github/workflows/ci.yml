name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt
        env:
          PIP_NO_CACHE_DIR: "1"
          PIP_EXTRA_INDEX_URL: https://www.paddlepaddle.org.cn/packages/stable/cpu/

      - name: Run tests
        run: python -m pytest backend/tests/test_validation_pipeline.py -v
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Build Docker image
        run: docker build -t document-intelligence .
